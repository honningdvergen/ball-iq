<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:relative; width:100%; filter:drop-shadow(0 34px 60px rgba(0,0,0,0.7));">

  <div style="position:absolute; left:-2px; top:15.5%; width:3px; height:3.6%; border-radius:2px 0 0 2px; background:linear-gradient(to right,#3b3f47,#171a1f);"></div>
  <div style="position:absolute; left:-2.5px; top:23.5%; width:3px; height:7%; border-radius:2px 0 0 2px; background:linear-gradient(to right,#3b3f47,#171a1f);"></div>
  <div style="position:absolute; left:-2.5px; top:32.2%; width:3px; height:7%; border-radius:2px 0 0 2px; background:linear-gradient(to right,#3b3f47,#171a1f);"></div>
  <div style="position:absolute; right:-2.5px; top:25%; width:3px; height:10.5%; border-radius:0 2px 2px 0; background:linear-gradient(to left,#3b3f47,#171a1f);"></div>

  <div style="position:relative; width:100%; padding:3.2%; border-radius:15.5%/7.1%; background:linear-gradient(135deg,#52565f 0%,#262931 16%,#13151a 50%,#23262e 84%,#4a4e58 100%); box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.10), inset 0 0 0 3px #0a0b0e, 0 0 0 1px #050608;">
    <div style="position:relative; overflow:hidden; border-radius:12.4%/5.7%; background:#0F1117; box-shadow:inset 0 0 0 2px rgba(0,0,0,0.55);">
      <img src="{{ src }}" alt="{{ alt }}" style="display:block; width:100%; height:auto;" />
      <div style="position:absolute; top:1.55%; left:50%; transform:translateX(-50%); width:30%; height:2.9%; background:#000; border-radius:999px; box-shadow:0 0 0 0.5px rgba(255,255,255,0.06);">
        <div style="position:absolute; right:13%; top:50%; transform:translateY(-50%); width:15%; height:46%; border-radius:50%; background:radial-gradient(circle at 35% 30%, #14202f, #000 70%);"></div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:250,&quot;height&quot;:560},&quot;src&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;assets/ball.png&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;alt&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;App screen&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
