<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Ball IQ — The Ultimate Football Quiz" />
    <meta property="og:title" content="Ball IQ" />
    <meta property="og:description" content="Test your football knowledge. 3,900+ questions across 10 game modes." />
    <title>Ball IQ</title>

    <!-- Early hints — warm DNS / TLS for every origin the first paint + first auth needs. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://blcisypmngimqkwxrrdm.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://blcisypmngimqkwxrrdm.supabase.co" />

    <!-- Fonts loaded NON-render-blocking: swap to `all` once parsed so first paint
         isn't gated on the Google Fonts CSS round-trip. Falls back through the
         system stack (-apple-system, Inter bundled nowhere) until Inter arrives. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" />
    </noscript>

    <link rel="icon" type="image/png" href="/icon-192.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <link rel="manifest" href="/manifest.json">
    <!-- iOS Safari PWA hints — make 'Add to Home Screen' launch standalone instead of as a bookmark, with a dark status bar to match the splash. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ball IQ" />
    <meta name="mobile-web-app-capable" content="yes" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0a;
        min-height: 100vh;
        min-height: 100dvh;
        overscroll-behavior: none;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #0a0a0a;
      }
      html.light, html.light body, html.light #root,
      body.light, body.light #root {
        background-color: #F2F2F7;
      }
      /* Splash shown from first paint until React mounts and replaces #root's
         contents. Avoids the blank-screen gap during the cold-start Supabase
         auth round-trip on iOS home-screen launches. */
      .biq-splash {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 14px;
        background: #0a0a0a; color: #F0F1F5;
        font-weight: 800; letter-spacing: -0.5px;
        /* Nudge the centred content slightly above geometric centre. Two
           reasons: (1) iOS standalone status bar (~44pt) is larger than
           the home indicator (~34pt) at the bottom, so geometric centre
           sits visually below the midpoint between the two safe areas;
           (2) optical centre is perceived a few percent above geometric
           centre regardless of device. The padding shrinks the flex
           container's effective area at the bottom, so justify-content:
           center lands the mark + bar at ~47% of viewport height. */
        padding-bottom: 4vh;
      }
      .biq-splash-mark { font-size: 32px; }
      .biq-splash-mark em { color: #58CC02; font-style: normal; }
      .biq-splash-dot {
        width: 28px; height: 4px; border-radius: 2px; overflow: hidden;
        background: rgba(255,255,255,0.08);
      }
      .biq-splash-dot::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: #58CC02;
        animation: biqSplashBar 1.1s ease-in-out infinite;
      }
      @keyframes biqSplashBar {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(250%); }
      }
      html.light .biq-splash { background: #F2F2F7; color: #1C1C1E; }
      html.light .biq-splash-dot { background: rgba(0,0,0,0.08); }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="biq-splash" aria-label="Loading Ball IQ">
        <div class="biq-splash-mark">Ball <em>IQ</em></div>
        <div class="biq-splash-dot"></div>
      </div>
    </div>
    <script>
      // Apply the saved theme class BEFORE React mounts so light-mode users
      // don't see a one-frame flash of the dark palette on reload.
      try {
        var s = JSON.parse(localStorage.getItem('biq_settings') || '{}');
        if (s && s.theme === 'light') {
          document.documentElement.classList.add('light');
          document.body.classList.add('light');
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the PWA service worker after first load so static assets
      // (JS / CSS / fonts / icons) can be served cache-first on subsequent
      // home-screen launches. Scoped to / so it controls the whole app.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js').catch(function () {});
        });
      }
    </script>
  </body>
</html>
